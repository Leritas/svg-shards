<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>SVG Highlighter — Plugin Playground</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="./styles/tokens.css" />
        <link rel="stylesheet" href="./styles/layout.css" />
        <link rel="stylesheet" href="./styles/components.css" />
        <link rel="stylesheet" href="./styles/plugin.css" />
    </head>
    <body>
        <div class="app">
            <aside class="sidebar">
                <div class="sidebar-header">
                    <h1>SVG Highlighter</h1>
                    <p>@svg-shards/highlighter playground</p>
                </div>
                <ul class="lesson-nav" id="lesson-nav"></ul>
                <div class="sidebar-footer">
                    <a href="https://github.com/Leritas/svg-shards" target="_blank" rel="noopener">GitHub</a>
                    <a href="../../../playground/index.html">Core playground</a>
                </div>
            </aside>

            <main class="main">
                <div class="canvas-column">
                    <div class="canvas-header">
                        <h2>Live SVG</h2>
                        <button type="button" class="btn btn-sm" id="btn-reset-scene">Reset scene</button>
                    </div>
                    <div class="canvas-host" id="canvas-host"></div>
                </div>

                <div class="lesson-column" id="lesson-panel">
                    <h2 class="lesson-title" id="lesson-title">Loading…</h2>
                    <p class="lesson-description" id="lesson-description"></p>
                    <div class="api-refs" id="lesson-api-refs"></div>
                    <div class="controls" id="lesson-controls"></div>
                    <pre class="code-block" id="lesson-snippet"></pre>
                </div>
            </main>

            <section class="log-panel">
                <div class="log-header">
                    <span>API Log</span>
                    <button type="button" class="btn btn-sm" id="btn-clear-log">Clear</button>
                </div>
                <pre class="log-output" id="log-output"></pre>
            </section>
        </div>

        <template id="scene-svg-template">
            <svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
                <rect id="background" x="0" y="0" width="400" height="300" fill="#0f1419" stroke="none" />
                <rect
                    id="panel"
                    x="40"
                    y="40"
                    width="120"
                    height="80"
                    rx="8"
                    fill="#4a90d9"
                    stroke="#2c5282"
                    stroke-width="2"
                    data-role="accent"
                />
                <circle
                    id="sun"
                    cx="320"
                    cy="60"
                    r="30"
                    fill="#f6ad55"
                    stroke="#dd6b20"
                    stroke-width="2"
                    data-role="accent"
                />
                <ellipse
                    id="orbit"
                    cx="200"
                    cy="150"
                    rx="55"
                    ry="28"
                    fill="none"
                    stroke="#4a5568"
                    stroke-width="1.5"
                    stroke-dasharray="4 3"
                />
                <g id="scene-group">
                    <circle id="moon" cx="160" cy="140" r="12" fill="#e2e8f0" stroke="#718096" stroke-width="1.5" />
                    <path
                        id="trail"
                        d="M 180 160 Q 220 120 260 150"
                        fill="none"
                        stroke="#68d391"
                        stroke-width="3"
                        stroke-linecap="round"
                    />
                    <rect
                        id="badge"
                        x="230"
                        y="170"
                        width="36"
                        height="20"
                        rx="4"
                        fill="#805ad5"
                        stroke="#553c9a"
                        stroke-width="1.5"
                    />
                </g>
                <text id="label" x="40" y="260" fill="#a0aec0" font-size="14" font-family="system-ui, sans-serif">
                    highlighter playground
                </text>
            </svg>
        </template>

        <script type="module" src="./assets/playground.mjs"></script>
    </body>
</html>
