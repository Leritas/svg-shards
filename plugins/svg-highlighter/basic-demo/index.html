<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>SVG Highlighter — Basic Demo</title>
        <style>
            :root {
                color-scheme: light dark;
                font-family: system-ui, sans-serif;
            }

            body {
                margin: 0;
                min-height: 100vh;
                display: grid;
                place-items: center;
                background: #0f1419;
                color: #e2e8f0;
            }

            .demo {
                display: grid;
                gap: 1rem;
                width: min(420px, calc(100vw - 2rem));
            }

            h1 {
                margin: 0;
                font-size: 1.1rem;
                font-weight: 600;
            }

            p {
                margin: 0;
                color: #a0aec0;
                font-size: 0.9rem;
                line-height: 1.4;
            }

            svg {
                width: 100%;
                height: auto;
                border-radius: 8px;
                background: #1a202c;
            }

            .controls {
                display: flex;
                flex-wrap: wrap;
                gap: 0.5rem;
            }

            button {
                border: 1px solid #4a5568;
                border-radius: 6px;
                background: #2d3748;
                color: inherit;
                padding: 0.45rem 0.75rem;
                cursor: pointer;
                font: inherit;
            }

            button:hover {
                background: #4a5568;
            }

            button.mode-active {
                border-color: #f6ad55;
                background: #744210;
            }

            .mode-controls {
                display: flex;
                align-items: center;
                gap: 0.5rem;
                flex-wrap: wrap;
            }

            .mode-controls span {
                font-size: 0.85rem;
                color: #a0aec0;
            }

            .shard-list {
                list-style: none;
                margin: 0;
                padding: 0;
                display: grid;
                gap: 0.35rem;
            }

            .shard-list button {
                width: 100%;
                text-align: left;
            }

            .shard-list button.active {
                border-color: #f6ad55;
                background: #744210;
            }

            #status {
                font-size: 0.85rem;
                color: #cbd5e0;
            }
        </style>
    </head>
    <body>
        <div class="demo">
            <div>
                <h1>@svg-shards/highlighter</h1>
                <p>
                    Self-contained HTML — loads from
                    <a href="https://esm.sh" style="color: #63b3ed">esm.sh</a> (GitHub source). Share or open directly;
                    internet required. Click a shard or use Prev / Next.
                </p>
            </div>

            <svg id="scene" viewBox="0 0 400 240" xmlns="http://www.w3.org/2000/svg">
                <rect id="background" x="0" y="0" width="400" height="240" fill="#1a202c" stroke="none" />
                <rect
                    id="panel"
                    x="32"
                    y="32"
                    width="96"
                    height="64"
                    rx="8"
                    fill="#4a90d9"
                    stroke="#2c5282"
                    stroke-width="2"
                />
                <circle id="sun" cx="320" cy="52" r="26" fill="#f6ad55" stroke="#dd6b20" stroke-width="2" />
                <path
                    id="trail"
                    d="M 150 150 Q 200 100 260 140"
                    fill="none"
                    stroke="#68d391"
                    stroke-width="3"
                    stroke-linecap="round"
                />
                <g id="badge-group">
                    <rect
                        id="badge"
                        x="250"
                        y="160"
                        width="40"
                        height="22"
                        rx="4"
                        fill="#805ad5"
                        stroke="#553c9a"
                        stroke-width="1.5"
                    />
                    <circle id="dot" cx="270" cy="171" r="4" fill="#faf089" stroke="none" />
                </g>
            </svg>

            <div class="controls">
                <button type="button" id="btn-prev">← Prev</button>
                <button type="button" id="btn-next">Next →</button>
                <button type="button" id="btn-clear">Clear</button>
            </div>

            <div class="mode-controls">
                <span>Mode:</span>
                <button type="button" id="btn-mode-fill" class="mode-active">Fill</button>
                <button type="button" id="btn-mode-outline">Outline</button>
            </div>

            <ul class="shard-list" id="shard-list"></ul>
            <div id="status">Loading…</div>
        </div>

        <script type="module">
            const status = document.getElementById('status');

            try {
                const { SvgHighlighter } =
                    await import('https://esm.sh/gh/Leritas/svg-shards/plugins/svg-highlighter/src/index.ts');

                const svg = document.getElementById('scene');
                const list = document.getElementById('shard-list');

                const highlighter = SvgHighlighter.create(svg, {
                    highlightColor: '#ff6600',
                    strokeWidthBoost: 2,
                });

                if (!highlighter) {
                    status.textContent = 'Failed to initialize SvgHighlighter';
                    throw new Error('SvgHighlighter.create returned null');
                }

                const refreshModeButtons = () => {
                    const mode = highlighter.getHighlightMode();
                    document.getElementById('btn-mode-fill').classList.toggle('mode-active', mode === 'fill');
                    document.getElementById('btn-mode-outline').classList.toggle('mode-active', mode === 'outline');
                };

                const refresh = () => {
                    const active = highlighter.getCurrentIndex();
                    list.replaceChildren();

                    for (const [index, entry] of highlighter.getElementList().entries()) {
                        const button = document.createElement('button');
                        button.type = 'button';
                        button.className = active === index ? 'active' : '';
                        button.textContent = `${entry.type} — ${entry.label}`;
                        button.addEventListener('click', () => {
                            // This is where we assign the highlight call to the shards.
                            highlighter.highlightByIndex(index);
                            refresh();
                        });
                        list.appendChild(button);
                    }

                    refreshModeButtons();

                    if (active >= 0) {
                        const entry = highlighter.getElementList()[active];
                        status.textContent = `Highlighted: ${entry.label} (${entry.type}) · ${highlighter.getHighlightMode()} mode`;
                    } else {
                        status.textContent = `No highlight · ${highlighter.getHighlightMode()} mode`;
                    }
                };

                document.getElementById('btn-mode-fill').addEventListener('click', () => {
                    // This is where we change the highlight mode.
                    highlighter.setHighlightMode('fill');
                    refresh();
                });

                document.getElementById('btn-mode-outline').addEventListener('click', () => {
                    // This is where we change the highlight mode.
                    highlighter.setHighlightMode('outline');
                    refresh();
                });

                document.getElementById('btn-prev').addEventListener('click', () => {
                    highlighter.highlightPrev();
                    refresh();
                });

                document.getElementById('btn-next').addEventListener('click', () => {
                    highlighter.highlightNext();
                    refresh();
                });

                document.getElementById('btn-clear').addEventListener('click', () => {
                    highlighter.clearHighlight();
                    refresh();
                });

                refresh();
            } catch (error) {
                status.textContent = 'Failed to load library — check internet connection';
                console.error(error);
            }
        </script>
    </body>
</html>
