<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>SVG Highlighter Demo — svg-shards</title>
        <link rel="stylesheet" href="./demo.css" />
    </head>
    <body>
        <div class="gallery">
            <aside class="sidebar">
                <div class="sidebar-header">
                    <h1>SVG Shards</h1>
                    <p>Highlighter gallery — click a shard to inspect</p>
                </div>
                <ul class="element-list" id="element-list"></ul>
            </aside>

            <main class="main">
                <div class="toolbar">
                    <button id="btn-prev" type="button">← Prev</button>
                    <button id="btn-next" type="button">Next →</button>
                    <fieldset class="mode-switch" id="mode-switch">
                        <legend class="sr-only">Highlight mode</legend>
                        <label class="mode-option">
                            <input type="radio" name="highlight-mode" value="fill" checked />
                            Fill
                        </label>
                        <label class="mode-option">
                            <input type="radio" name="highlight-mode" value="outline" />
                            Outline
                        </label>
                    </fieldset>
                    <span class="spacer"></span>
                    <button id="btn-zoom-in" type="button">+</button>
                    <button id="btn-zoom-out" type="button">−</button>
                    <button id="btn-rotate" type="button">↻ 90°</button>
                    <button id="btn-reset" type="button">Reset view</button>
                </div>
                <div class="viewport-host" id="viewport"></div>
                <div class="error-panel hidden" id="error-panel"></div>
            </main>
        </div>

        <!-- Inline SVG avoids fetch issues; same content as sample.svg -->
        <template id="sample-svg-template">
            <svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
                <rect id="background" x="0" y="0" width="400" height="300" fill="#f5f5f5" stroke="none" />
                <rect
                    id="panel"
                    x="40"
                    y="40"
                    width="120"
                    height="80"
                    rx="8"
                    fill="#4a90d9"
                    stroke="#2c5282"
                    stroke-width="2"
                />
                <circle id="sun" cx="320" cy="60" r="30" fill="#f6ad55" stroke="#dd6b20" stroke-width="2" />
                <ellipse
                    id="cloud"
                    cx="200"
                    cy="70"
                    rx="45"
                    ry="20"
                    fill="#e2e8f0"
                    stroke="#a0aec0"
                    stroke-width="1.5"
                />
                <line id="horizon" x1="20" y1="220" x2="380" y2="220" stroke="#718096" stroke-width="2" />
                <polygon
                    id="mountain"
                    points="80,220 160,120 240,220"
                    fill="#68d391"
                    stroke="#276749"
                    stroke-width="2"
                />
                <polyline
                    id="path"
                    points="260,220 290,180 320,200 350,160"
                    fill="none"
                    stroke="#805ad5"
                    stroke-width="3"
                />
                <path
                    id="wave"
                    d="M20 250 Q60 230 100 250 T180 250 T260 250 T340 250"
                    fill="none"
                    stroke="#3182ce"
                    stroke-width="2"
                />
                <text id="title" x="40" y="30" font-size="18" font-family="sans-serif" fill="#2d3748">
                    SVG Shards Demo
                </text>
                <g id="house-group">
                    <rect
                        id="house-body"
                        x="280"
                        y="160"
                        width="60"
                        height="50"
                        fill="#ed8936"
                        stroke="#c05621"
                        stroke-width="2"
                    />
                    <polygon
                        id="house-roof"
                        points="270,160 310,120 350,160"
                        fill="#e53e3e"
                        stroke="#9b2c2c"
                        stroke-width="2"
                    />
                </g>
            </svg>
        </template>

        <script type="module" src="./demo.js"></script>
    </body>
</html>
