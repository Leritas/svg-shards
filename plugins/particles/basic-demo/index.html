<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>@svg-shards/particles — basic demo</title>
        <style>
            body {
                margin: 0;
                min-height: 100vh;
                display: grid;
                place-items: center;
                background: #0f1419;
                font-family: system-ui, sans-serif;
                color: #cbd5e0;
            }
            svg {
                width: min(96vw, 640px);
                border: 1px solid #4a5568;
                border-radius: 8px;
                background: #0f1419;
            }
        </style>
    </head>
    <body>
        <svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
            <rect x="0" y="0" width="400" height="300" fill="#0f1419" />
            <rect x="1" y="1" width="398" height="298" fill="none" stroke="#4a5568" stroke-width="2" />
            <g id="particles"></g>
        </svg>

        <script type="module">
            import { createSvgShards } from '../../../dist/index.js';
            import { ParticleField } from '../dist/index.js';

            const svg = document.querySelector('svg');
            const container = createSvgShards.fromElement(svg);
            const group = container.getById('particles');

            const field = new ParticleField(container, {
                bounds: { width: 400, height: 300 },
                gravity: 980,
                restitution: 0.9,
                parent: group,
            });

            field.spawn(80, (i) => ({
                cx: Math.random() * 400,
                cy: Math.random() * 120,
                r: 4 + Math.random() * 5,
                vx: (Math.random() - 0.5) * 180,
                vy: (Math.random() - 0.5) * 80,
                fill: `hsl(${(i * 9) % 360}, 75%, 55%)`,
            }));

            field.start();
        </script>
    </body>
</html>
