<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>SVG Particles — Plugin Playground</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="./styles/tokens.css" />
        <link rel="stylesheet" href="./styles/layout.css" />
        <link rel="stylesheet" href="./styles/components.css" />
        <link rel="stylesheet" href="./styles/plugin.css" />
    </head>
    <body>
        <div class="app">
            <aside class="sidebar">
                <div class="sidebar-header">
                    <h1>SVG Particles</h1>
                    <p>@svg-shards/particles playground</p>
                </div>
                <ul class="lesson-nav" id="lesson-nav"></ul>
                <div class="sidebar-footer">
                    <a href="https://github.com/Leritas/svg-shards" target="_blank" rel="noopener">GitHub</a>
                    <a href="../../../playground/index.html">Core playground</a>
                </div>
            </aside>

            <main class="main">
                <div class="canvas-column">
                    <div class="canvas-header">
                        <h2>Live SVG</h2>
                        <button type="button" class="btn btn-sm" id="btn-reset-scene">Reset scene</button>
                    </div>
                    <div class="canvas-host" id="canvas-host"></div>
                </div>

                <div class="lesson-column" id="lesson-panel">
                    <h2 class="lesson-title" id="lesson-title">Loading…</h2>
                    <p class="lesson-description" id="lesson-description"></p>
                    <div class="api-refs" id="lesson-api-refs"></div>
                    <div class="controls" id="lesson-controls"></div>
                    <pre class="code-block" id="lesson-snippet"></pre>
                </div>
            </main>

            <section class="log-panel">
                <div class="log-header">
                    <span>API Log</span>
                    <button type="button" class="btn btn-sm" id="btn-clear-log">Clear</button>
                </div>
                <pre class="log-output" id="log-output"></pre>
            </section>
        </div>

        <template id="scene-svg-template">
            <svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
                <rect x="0" y="0" width="400" height="300" fill="#0f1419" />
                <rect
                    x="1"
                    y="1"
                    width="398"
                    height="298"
                    fill="none"
                    stroke="#4a5568"
                    stroke-width="2"
                    pointer-events="none"
                />
                <g id="particles"></g>
            </svg>
        </template>

        <script type="module" src="./assets/playground.mjs"></script>
    </body>
</html>
